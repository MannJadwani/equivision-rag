<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AI PDF Extractor</title>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 42px;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 40px;
            color: #94a3b8;
        }

        .card {
            background: #111827;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #1e293b;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        input[type=file] {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
        }

        button {
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-success {
            background: #059669;
            color: white;
            margin-left: 10px;
            display: none;
        }

        .btn-success:hover {
            background: #047857;
        }

        .loading {
            margin-top: 30px;
            display: none;
            text-align: center;
        }

        .progress-text {
            margin-top: 15px;
            font-size: 18px;
            color: #60a5fa;
            font-weight: bold;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #334155;
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            margin: auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .status {
            margin-top: 25px;
            padding: 14px;
            border-radius: 10px;
            display: none;
        }

        .success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .table-container {
            margin-top: 40px;
            overflow-x: auto;
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #1e293b;
            color: #3b82f6;
            padding: 16px;
            text-align: left;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #1e293b;
        }

        tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .filename {
            font-weight: bold;
        }

        .answer-box {
            background: rgba(59,130,246,0.08);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .question {
            color: #60a5fa;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .answer {
            color: #e2e8f0;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>🧠 AI PDF Extractor</h1>

        <p class="subtitle">
            Upload PDFs → Extract Answers → Download Excel
        </p>

        <div class="card">

            <form id="uploadForm">

                <div class="form-group">
                    <label>Select PDF Files</label>

                    <input
                        type="file"
                        id="pdfFiles"
                        accept=".pdf"
                        multiple
                        required
                    />
                </div>

                <button type="submit" class="btn-primary">
                    Process PDFs
                </button>

                <button
                    type="button"
                    class="btn-success"
                    id="downloadBtn"
                    onclick="downloadExcel()"
                >
                    Download Excel
                </button>

            </form>

            <div class="loading" id="loading">

                <div class="spinner"></div>

                <p style="margin-top:20px;">
                    Processing PDFs...
                </p>

                <div class="progress-text" id="progressText"></div>

            </div>

            <div class="status" id="status"></div>

            <div class="table-container" id="tableContainer">

                <table>

                    <thead>
                        <tr>
                            <th>PDF</th>
                            <th>Extracted Answers</th>
                        </tr>
                    </thead>

                    <tbody id="resultsBody"></tbody>

                </table>

            </div>

        </div>

    </div>

    <script>

        const API_BASE = window.location.origin;

        let globalResults = [];

        function showStatus(message, type) {

            const status = document.getElementById("status");

            status.style.display = "block";

            status.className = `status ${type}`;

            status.innerHTML = message;
        }

        document
            .getElementById("uploadForm")
            .addEventListener("submit", async (e) => {

                e.preventDefault();

                const files =
                    document.getElementById("pdfFiles").files;

                if (files.length === 0) {

                    showStatus(
                        "Please upload PDFs",
                        "error"
                    );

                    return;
                }

                const formData = new FormData();

                for (let file of files) {

                    formData.append("pdfs", file);
                }

                document
                    .getElementById("loading")
                    .style.display = "block";

                document
                    .getElementById("tableContainer")
                    .style.display = "none";

                document
                    .getElementById("downloadBtn")
                    .style.display = "none";

                try {

                    const response = await fetch(
                        `${API_BASE}/ingest-stream`,
                        {
                            method: "POST",
                            body: formData
                        }
                    );

                    if (!response.ok) {

                        throw new Error(
                            "Failed to process PDFs"
                        );
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let results = [];
                    let totalFiles = 0;

                    while (true) {

                        const { done, value } = await reader.read();

                        if (done) break;

                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');

                        for (let line of lines) {

                            if (line.startsWith('data: ')) {

                                const jsonStr = line.replace('data: ', '').trim();
                                if (jsonStr) {
                                    try {
                                        const data = JSON.parse(jsonStr);

                                        if (data.complete) {
                                            // Processing complete
                                            results = data.results;
                                            totalFiles = data.total_files;
                                            globalResults = data.results;
                                        } else if (data.progress) {
                                            // Update progress
                                            const progressText = document.getElementById("progressText");
                                            progressText.textContent = `${data.progress} out of ${data.total} - Processing: ${data.filename}`;
                                        }
                                    } catch (parseErr) {
                                        console.error("Parse error:", parseErr);
                                    }
                                }
                            }
                        }
                    }

                    renderResults(results);

                    showStatus(
                        `Successfully processed ${totalFiles} PDFs`,
                        "success"
                    );

                } catch (err) {

                    showStatus(
                        err.message,
                        "error"
                    );

                } finally {

                    document
                        .getElementById("loading")
                        .style.display = "none";
                }

            });

        function renderResults(results) {

            const tbody =
                document.getElementById("resultsBody");

            tbody.innerHTML = "";

            results.forEach(file => {

                const row =
                    document.createElement("tr");

                let answersHtml = "";

                file.qas.forEach(qa => {

                    answersHtml += `
                        <div class="answer-box">

                            <div class="question">
                                ${qa.question}
                            </div>

                            <div class="answer">
                                ${qa.answer}
                            </div>

                        </div>
                    `;
                });

                row.innerHTML = `

                    <td class="filename">
                        ${file.filename}
                    </td>

                    <td>
                        ${answersHtml}
                    </td>
                `;

                tbody.appendChild(row);

            });

            document
                .getElementById("tableContainer")
                .style.display = "block";

            document
                .getElementById("downloadBtn")
                .style.display = "inline-block";
        }

        function downloadExcel() {

            if (globalResults.length === 0) {

                showStatus(
                    "No results available",
                    "error"
                );

                return;
            }

            const excelData = [];

            globalResults.forEach(file => {

                let row = {
                    PDF: file.filename
                };

                file.qas.forEach(qa => {

                    row[qa.question] = qa.answer;
                });

                excelData.push(row);
            });

            const worksheet =
                XLSX.utils.json_to_sheet(excelData);

            worksheet["!cols"] = [
                { wch: 40 },
                { wch: 50 },
                { wch: 50 },
                { wch: 50 },
                { wch: 50 }
            ];

            const workbook =
                XLSX.utils.book_new();

            XLSX.utils.book_append_sheet(
                workbook,
                worksheet,
                "Results"
            );

            XLSX.writeFile(
                workbook,
                "pdf_extraction_results.xlsx"
            );

            showStatus(
                "Excel downloaded successfully",
                "success"
            );
        }

    </script>

</body>

</html>
